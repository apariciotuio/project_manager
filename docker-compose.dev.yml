services:
  postgres:
    image: postgres:16-alpine
    container_name: wmp-postgres
    environment:
      POSTGRES_USER: wmp
      POSTGRES_PASSWORD: wmp
      POSTGRES_DB: wmp
    ports:
      - "17000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmp -d wmp"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: wmp-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://wmp:wmp@postgres:5432/wmp
      CELERY_BROKER_URL: sqla+postgresql+psycopg://wmp:wmp@postgres:5432/wmp
      CELERY_RESULT_BACKEND: db+postgresql+psycopg://wmp:wmp@postgres:5432/wmp
    ports:
      - "17004:17004"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 17004 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: wmp-frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:17004
    ports:
      - "17005:17005"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  dundun-fake:
    build:
      context: ./infra/dundun-fake
      dockerfile: Dockerfile
    container_name: wmp-dundun-fake
    environment:
      FAKE_MODE: deterministic
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
